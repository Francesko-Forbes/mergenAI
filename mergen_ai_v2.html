<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MERGEN AI</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Orbitron:wght@600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f0f2ee;
  --sidebar:#e8ebe4;
  --surface:#ffffff;
  --surface2:#f5f7f3;
  --border:#d8ddd3;
  --border-light:#e8ece4;
  --olive:#5a6e45;
  --olive-hi:#6e8a54;
  --olive-light:#eef2e8;
  --olive-mid:#c8d4bc;
  --amber:#8a6e3a;
  --amber-light:#f5ede0;
  --text:#2a3020;
  --text-mid:#5a6850;
  --text-dim:#8a9880;
  --user-bg:#2a3020;
  --user-text:#e8ece4;
  --shadow:rgba(42,48,32,0.08);
  --shadow-md:rgba(42,48,32,0.14);
}

html,body{height:100%;overflow:hidden}
body{
  font-family:'Outfit',sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;height:100vh;
}

/* subtle texture overlay */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%235a6e45' fill-opacity='0.025'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  opacity:1;
}

/* ── SIDEBAR ── */
#sidebar{
  width:256px;flex-shrink:0;
  background:var(--sidebar);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  position:relative;z-index:10;
  box-shadow:2px 0 12px var(--shadow);
}

.sb-head{
  padding:22px 20px 18px;
  border-bottom:1px solid var(--border);
}

.logo-row{display:flex;align-items:center;gap:11px;margin-bottom:2px}

.logo-emblem{
  width:34px;height:34px;flex-shrink:0;
  background:var(--olive);
  display:flex;align-items:center;justify-content:center;
  position:relative;
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
}
.logo-emblem span{
  font-family:'Orbitron',monospace;font-size:8px;font-weight:700;
  color:#fff;letter-spacing:1px;
}

.logo-name{
  font-family:'Orbitron',monospace;font-weight:900;
  font-size:16px;color:var(--text);letter-spacing:1px;
}
.logo-name em{color:var(--olive-hi);font-style:normal}

.logo-tag{
  font-size:10px;color:var(--text-dim);letter-spacing:2px;
  padding-left:45px;margin-top:1px;
  font-family:'JetBrains Mono',monospace;
}

.btn-new{
  margin:14px 16px 0;
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 16px;
  background:var(--olive);
  border:none;border-radius:10px;
  color:#fff;font-family:'Outfit',sans-serif;
  font-weight:600;font-size:13px;letter-spacing:.5px;
  cursor:pointer;transition:all .2s;
  box-shadow:0 2px 8px rgba(90,110,69,0.3);
}
.btn-new:hover{background:var(--olive-hi);box-shadow:0 4px 16px rgba(90,110,69,0.4);transform:translateY(-1px)}
.btn-new svg{width:14px;height:14px;stroke:#fff;stroke-width:2.5;fill:none}

.sb-label{
  padding:16px 20px 6px;
  font-size:10px;letter-spacing:2px;color:var(--text-dim);
  text-transform:uppercase;font-weight:500;
}

#chat-list{flex:1;overflow-y:auto;padding:4px 10px 10px}
#chat-list::-webkit-scrollbar{width:3px}
#chat-list::-webkit-scrollbar-thumb{background:var(--olive-mid);border-radius:2px}

.chat-item{
  display:flex;align-items:center;gap:9px;
  padding:9px 12px;border-radius:8px;
  cursor:pointer;transition:all .15s;
  font-size:13px;color:var(--text-mid);
  font-weight:400;margin-bottom:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.chat-item:hover{background:var(--olive-light);color:var(--text)}
.chat-item.active{background:var(--olive-light);color:var(--olive);font-weight:600}
.chat-icon{
  width:20px;height:20px;flex-shrink:0;
  border-radius:4px;background:var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;
}
.chat-item.active .chat-icon{background:var(--olive);color:#fff}

.sb-footer{
  padding:14px 20px;border-top:1px solid var(--border);
  display:flex;align-items:center;gap:9px;
}
.status-pill{
  display:flex;align-items:center;gap:6px;
  background:var(--olive-light);border-radius:20px;
  padding:5px 10px;font-size:11px;color:var(--olive);
  font-weight:500;letter-spacing:.5px;
}
.status-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--olive-hi);
  animation:pulse 2.5s infinite;
}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(110,138,84,0.4)}70%{opacity:.8;box-shadow:0 0 0 5px rgba(110,138,84,0)}}

/* ── MAIN ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;z-index:1}

#topbar{
  padding:14px 28px;
  background:var(--surface);
  border-bottom:1px solid var(--border-light);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
  box-shadow:0 1px 8px var(--shadow);
}
.topbar-title{
  display:flex;align-items:center;gap:10px;
  font-family:'Orbitron',monospace;font-size:11px;
  font-weight:600;color:var(--text-mid);letter-spacing:2px;
}
.topbar-badge{
  background:var(--olive-light);color:var(--olive);
  font-size:10px;padding:3px 8px;border-radius:20px;
  font-family:'Outfit',sans-serif;font-weight:600;letter-spacing:.5px;
}
.top-btn{
  background:transparent;border:1.5px solid var(--border);
  border-radius:8px;padding:6px 14px;
  color:var(--text-dim);font-family:'Outfit',sans-serif;
  font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;
}
.top-btn:hover{border-color:var(--amber);color:var(--amber);background:var(--amber-light)}

/* messages */
#messages{flex:1;overflow-y:auto;padding:28px 0;scroll-behavior:smooth}
#messages::-webkit-scrollbar{width:4px}
#messages::-webkit-scrollbar-thumb{background:var(--olive-mid);border-radius:2px}

.msg-wrap{max-width:820px;margin:0 auto;padding:0 28px;display:flex;flex-direction:column;gap:8px}

/* empty state */
.empty{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:100%;text-align:center;padding:40px;
}
.empty-logo{
  width:72px;height:72px;
  background:linear-gradient(135deg,var(--olive),var(--olive-hi));
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:20px;
  box-shadow:0 8px 32px rgba(90,110,69,0.25);
}
.empty-logo span{font-family:'Orbitron',monospace;font-weight:900;font-size:14px;color:#fff;letter-spacing:1px}
.empty-title{
  font-family:'Orbitron',monospace;font-weight:700;
  font-size:18px;color:var(--text);letter-spacing:2px;margin-bottom:8px;
}
.empty-sub{
  font-size:14px;color:var(--text-dim);
  max-width:320px;line-height:1.7;margin-bottom:28px;
}
.suggestions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:540px}
.sug{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:10px;padding:9px 16px;
  color:var(--text-mid);font-family:'Outfit',sans-serif;
  font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;
  box-shadow:0 1px 4px var(--shadow);
}
.sug:hover{
  border-color:var(--olive);color:var(--olive);
  background:var(--olive-light);
  box-shadow:0 2px 10px rgba(90,110,69,0.15);
  transform:translateY(-1px);
}

/* message */
.message{
  display:flex;gap:14px;
  padding:4px 0;
  animation:msgIn .25s cubic-bezier(.16,1,.3,1);
}
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.message.user{flex-direction:row-reverse}

.av{
  width:36px;height:36px;border-radius:10px;
  flex-shrink:0;margin-top:2px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',monospace;font-size:9px;font-weight:700;
}
.av.ai-av{
  background:linear-gradient(135deg,var(--olive),var(--olive-hi));
  color:#fff;
  box-shadow:0 2px 8px rgba(90,110,69,0.3);
}
.av.user-av{
  background:var(--user-bg);color:#d0d8c8;
  box-shadow:0 2px 8px rgba(42,48,32,0.2);
}

.msg-body{flex:1;min-width:0}
.msg-role{
  font-size:11px;font-weight:600;letter-spacing:.5px;
  color:var(--text-dim);margin-bottom:5px;
}
.message.user .msg-body{align-items:flex-end;display:flex;flex-direction:column}

.msg-bubble{
  display:inline-block;
  padding:12px 16px;border-radius:16px;
  font-size:15px;line-height:1.7;
  word-break:break-word;white-space:pre-wrap;
  max-width:100%;
}
.message.ai .msg-bubble{
  background:var(--surface);
  border:1px solid var(--border-light);
  color:var(--text);
  border-top-left-radius:4px;
  box-shadow:0 2px 12px var(--shadow);
}
.message.user .msg-bubble{
  background:var(--user-bg);
  color:var(--user-text);
  border-top-right-radius:4px;
  box-shadow:0 2px 12px rgba(42,48,32,0.2);
}

.msg-bubble code{
  font-family:'JetBrains Mono',monospace;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:4px;padding:1px 6px;font-size:13px;
  color:var(--olive);
}
.msg-bubble pre{
  background:var(--surface2);border:1px solid var(--border);
  border-left:3px solid var(--olive);border-radius:8px;
  padding:14px 16px;margin:8px 0;
  overflow-x:auto;font-family:'JetBrains Mono',monospace;
  font-size:12px;line-height:1.6;color:var(--text);
}
.msg-bubble pre code{background:none;border:none;padding:0;color:var(--text)}

/* cursor */
.tw-cursor{
  display:inline-block;width:2px;height:16px;
  background:var(--olive);margin-left:2px;vertical-align:middle;
  border-radius:1px;animation:twBlink .6s infinite;
}
@keyframes twBlink{0%,100%{opacity:1}50%{opacity:0}}

/* typing dots */
.typing-dots{display:flex;align-items:center;gap:5px;padding:4px 2px}
.td{
  width:8px;height:8px;border-radius:50%;
  background:var(--olive-mid);
  animation:tdAnim 1.4s infinite ease-in-out;
}
.td:nth-child(1){animation-delay:0s}
.td:nth-child(2){animation-delay:.2s}
.td:nth-child(3){animation-delay:.4s}
@keyframes tdAnim{0%,80%,100%{transform:scale(.7);opacity:.5}40%{transform:scale(1.1);opacity:1;background:var(--olive-hi)}}

/* ── INPUT ── */
#input-zone{
  padding:14px 28px 20px;
  background:var(--surface);
  border-top:1px solid var(--border-light);
  flex-shrink:0;
  box-shadow:0 -2px 12px var(--shadow);
}
.input-inner{max-width:820px;margin:0 auto}
.input-box{
  display:flex;align-items:flex-end;gap:10px;
  background:var(--surface2);
  border:1.5px solid var(--border);
  border-radius:14px;padding:10px 10px 10px 16px;
  transition:all .25s;
  box-shadow:0 2px 8px var(--shadow);
}
.input-box:focus-within{
  border-color:var(--olive);
  box-shadow:0 0 0 3px rgba(90,110,69,0.1), 0 2px 12px var(--shadow-md);
}
#txt{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--text);font-family:'Outfit',sans-serif;
  font-size:15px;line-height:1.6;resize:none;
  min-height:26px;max-height:140px;padding:2px 0;
}
#txt::placeholder{color:var(--text-dim)}
#send{
  width:36px;height:36px;flex-shrink:0;
  background:var(--olive);border:none;border-radius:10px;
  color:#fff;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(90,110,69,0.35);
}
#send:hover{background:var(--olive-hi);box-shadow:0 4px 16px rgba(90,110,69,0.45);transform:translateY(-1px)}
#send:disabled{background:var(--border);cursor:not-allowed;box-shadow:none;transform:none}
#send svg{width:15px;height:15px;stroke:#fff;stroke-width:2.5;fill:none}

.input-meta{
  display:flex;justify-content:space-between;align-items:center;
  padding:7px 4px 0;font-size:11px;color:var(--text-dim);
}
.kbd-hint{display:flex;gap:4px;align-items:center}
.kbd{
  background:var(--border-light);border:1px solid var(--border);
  border-radius:4px;padding:1px 6px;font-size:10px;
  font-family:'JetBrains Mono',monospace;color:var(--text-dim);
}

@media(max-width:650px){#sidebar{display:none}}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="sb-head">
    <div class="logo-row">
      <div class="logo-emblem"><span>M</span></div>
      <div class="logo-name">MERGEN<em> AI</em></div>
    </div>
    <div class="logo-tag">TACTICAL ASSISTANT</div>
  </div>
  <button class="btn-new" onclick="newChat()">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Новый сеанс
  </button>
  <div class="sb-label">История</div>
  <div id="chat-list"></div>
  <div class="sb-footer">
    <div class="status-pill">
      <div class="status-dot"></div>
      Система активна
    </div>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="topbar">
    <div class="topbar-title">
      MERGEN AI
      <span class="topbar-badge">● Онлайн</span>
    </div>
    <button class="top-btn" onclick="clearChat()">Очистить</button>
  </div>

  <div id="messages">
    <div id="empty" class="empty">
      <div class="empty-logo"><span>MRG</span></div>
      <div class="empty-title">MERGEN AI</div>
      <div class="empty-sub">Умный ассистент готов к работе. Задай любой вопрос на русском или английском.</div>
      <div class="suggestions">
        <button class="sug" onclick="use(this)">Что такое искусственный интеллект?</button>
        <button class="sug" onclick="use(this)">Напиши план тренировки</button>
        <button class="sug" onclick="use(this)">Помоги с кодом на Python</button>
        <button class="sug" onclick="use(this)">Объясни квантовые компьютеры</button>
        <button class="sug" onclick="use(this)">Write a short story about space</button>
        <button class="sug" onclick="use(this)">Переведи текст на английский</button>
      </div>
    </div>
    <div id="msg-list" class="msg-wrap" style="display:none"></div>
  </div>

  <div id="input-zone">
    <div class="input-inner">
      <div class="input-box">
        <textarea id="txt" placeholder="Напиши сообщение..." rows="1"
          onkeydown="onKey(event)" oninput="resize(this)"></textarea>
        <button id="send" onclick="send()">
          <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <div class="input-meta">
        <span class="kbd-hint">
          <span class="kbd">Enter</span> отправить &nbsp;
          <span class="kbd">Shift+Enter</span> новая строка
        </span>
        <span>MERGEN AI v1.0</span>
      </div>
    </div>
  </div>
</div>

<script>
let msgs=[], sessions=[], cur=null, busy=false;

function newChat(){
  msgs=[];
  cur={id:Date.now(),title:'Новый сеанс',msgs:[]};
  sessions.unshift(cur);
  renderSB();showEmpty();
  document.getElementById('txt').focus();
}

function renderSB(){
  document.getElementById('chat-list').innerHTML=sessions.map((s,i)=>
    `<div class="chat-item ${s===cur?'active':''}" onclick="loadSession(${i})">
      <div class="chat-icon">${s===cur?'▸':'○'}</div>
      ${s.title}
    </div>`
  ).join('');
}

function loadSession(i){
  cur=sessions[i];msgs=[...cur.msgs];
  renderSB();renderAll();
}

function clearChat(){
  msgs=[];if(cur)cur.msgs=[];showEmpty();
}

function showEmpty(){
  document.getElementById('empty').style.display='flex';
  document.getElementById('msg-list').style.display='none';
  document.getElementById('msg-list').innerHTML='';
}

function hideEmpty(){
  document.getElementById('empty').style.display='none';
  document.getElementById('msg-list').style.display='flex';
}

function renderAll(){
  if(!msgs.length){showEmpty();return;}
  hideEmpty();
  document.getElementById('msg-list').innerHTML=msgs.map(m=>bubble(m.role,m.content)).join('');
  scrollBot();
}

function fmt(t){
  t=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  t=t.replace(/```[\w]*\n?([\s\S]*?)```/g,'<pre><code>$1</code></pre>');
  t=t.replace(/`([^`]+)`/g,'<code>$1</code>');
  t=t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  t=t.replace(/\*(.*?)\*/g,'<em>$1</em>');
  return t;
}

function bubble(role,content){
  const isUser=role==='user';
  return `<div class="message ${isUser?'user':'ai'}">
    <div class="av ${isUser?'user-av':'ai-av'}">${isUser?'ВЫ':'AI'}</div>
    <div class="msg-body">
      <div class="msg-role">${isUser?'Вы':'Mergen AI'}</div>
      <div class="msg-bubble">${fmt(content)}</div>
    </div>
  </div>`;
}

function addMsg(role,content){
  msgs.push({role,content});
  if(cur)cur.msgs=[...msgs];
  hideEmpty();
  const list=document.getElementById('msg-list');
  const d=document.createElement('div');
  d.innerHTML=bubble(role,content);
  list.appendChild(d.firstElementChild);
  scrollBot();
  if(role==='user'&&msgs.filter(m=>m.role==='user').length===1&&cur){
    cur.title=content.substring(0,24)+(content.length>24?'...':'');
    renderSB();
  }
}

function addTyping(){
  hideEmpty();
  const list=document.getElementById('msg-list');
  const d=document.createElement('div');
  d.id='typing';d.className='message ai';
  d.innerHTML=`<div class="av ai-av">AI</div>
    <div class="msg-body">
      <div class="msg-role">Mergen AI</div>
      <div class="msg-bubble" style="padding:14px 16px">
        <div class="typing-dots">
          <div class="td"></div><div class="td"></div><div class="td"></div>
        </div>
      </div>
    </div>`;
  list.appendChild(d);scrollBot();
}

function removeTyping(){
  const el=document.getElementById('typing');if(el)el.remove();
}

// ── TYPEWRITER ──
function typewriterMsg(fullText){
  msgs.push({role:'assistant',content:fullText});
  if(cur)cur.msgs=[...msgs];
  hideEmpty();

  const list=document.getElementById('msg-list');
  const wrap=document.createElement('div');
  wrap.className='message ai';

  const bubbleEl=document.createElement('div');
  bubbleEl.className='msg-bubble';

  const avEl=document.createElement('div');
  avEl.className='av ai-av';
  avEl.textContent='AI';

  const bodyEl=document.createElement('div');
  bodyEl.className='msg-body';

  const roleEl=document.createElement('div');
  roleEl.className='msg-role';
  roleEl.textContent='Mergen AI';

  bodyEl.appendChild(roleEl);
  bodyEl.appendChild(bubbleEl);
  wrap.appendChild(avEl);
  wrap.appendChild(bodyEl);
  list.appendChild(wrap);
  scrollBot();

  const cursor=document.createElement('span');
  cursor.className='tw-cursor';
  bubbleEl.appendChild(cursor);

  let i=0;
  const speed=14;

  function type(){
    if(i<fullText.length){
      bubbleEl.textContent=fullText.substring(0,i+1);
      bubbleEl.appendChild(cursor);
      i++;
      scrollBot();
      setTimeout(type,speed);
    } else {
      cursor.remove();
      bubbleEl.innerHTML=fmt(fullText);
      scrollBot();
    }
  }
  type();
}

function scrollBot(){
  const el=document.getElementById('messages');
  el.scrollTop=el.scrollHeight;
}

async function send(){
  if(busy)return;
  const input=document.getElementById('txt');
  const text=input.value.trim();
  if(!text)return;
  input.value='';input.style.height='auto';
  addMsg('user',text);
  busy=true;
  document.getElementById('send').disabled=true;
  addTyping();

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1024,
        system:`Ты умный и полезный ИИ-ассистент по имени Mergen AI. Отвечай чётко, умно и по делу. Отвечай на том языке, на котором пишет пользователь — русский или английский. Помогай с любыми задачами.`,
        messages:msgs.map(m=>({role:m.role,content:m.content}))
      })
    });
    const data=await res.json();
    removeTyping();
    if(!res.ok){
      addMsg('assistant','⚠ Ошибка: '+(data.error?.message||'Неизвестная ошибка'));
    } else {
      typewriterMsg(data.content?.[0]?.text||'...');
    }
  } catch(e){
    removeTyping();
    addMsg('assistant','⚠ Ошибка соединения: '+e.message);
  }

  busy=false;
  document.getElementById('send').disabled=false;
  input.focus();
}

function onKey(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}
}

function resize(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,140)+'px';
}

function use(btn){
  document.getElementById('txt').value=btn.textContent;
  send();
}

newChat();
</script>
</body>
</html>
